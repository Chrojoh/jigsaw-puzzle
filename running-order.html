// ROUND KEY UTILITY FUNCTIONS

/**
 * Generate a standardized round key
 * @param {number} dayIndex - Day index (0-based)
 * @param {number} classIndex - Class index (0-based)
 * @param {number} roundIndex - Round index (0-based)
 * @returns {string} Standardized round key "dayIndex-classIndex-roundIndex"
 */
function generateRoundKey(dayIndex, classIndex, roundIndex) {
    // Ensure all inputs are integers
    const day = parseInt(dayIndex) || 0;
    const cls = parseInt(classIndex) || 0;
    const round = parseInt(roundIndex) || 0;
    
    return `${day}-${cls}-${round}`;
}

/**
 * Parse a round key into its components
 * @param {string} roundKey - Round key to parse
 * @returns {object} Object with dayIndex, classIndex, roundIndex
 */
function parseRoundKey(roundKey) {
    if (!roundKey || typeof roundKey !== 'string') {
        throw new Error(`Invalid round key: ${roundKey}`);
    }
    
    const parts = roundKey.split('-');
    if (parts.length !== 3) {
        throw new Error(`Invalid round key format: ${roundKey}. Expected format: dayIndex-classIndex-roundIndex`);
    }
    
    const dayIndex = parseInt(parts[0]);
    const classIndex = parseInt(parts[1]);
    const roundIndex = parseInt(parts[2]);
    
    if (isNaN(dayIndex) || isNaN(classIndex) || isNaN(roundIndex)) {
        throw new Error(`Round key contains non-numeric values: ${roundKey}`);
    }
    
    return {
        dayIndex,
        classIndex,
        roundIndex
    };
}

/**
 * Validate if a round key follows the standard format
 * @param {string} roundKey - Round key to validate
 * @returns {boolean} True if valid, false otherwise
 */
function validateRoundKey(roundKey) {
    try {
        if (!roundKey || typeof roundKey !== 'string') return false;
        
        // Check for common malformed patterns
        if (roundKey.includes('--')) return false; // Double dash
        if (roundKey.includes('_')) return false;  // Underscore
        if (roundKey.includes('.')) return false;  // Dot
        if (roundKey.includes(' ')) return false;  // Space
        
        const parts = roundKey.split('-');
        if (parts.length !== 3) return false;
        
        // Check if all parts are valid integers
        return parts.every(part => {
            const num = parseInt(part);
            return !isNaN(num) && num >= 0 && part === num.toString();
        });
    } catch (error) {
        return false;
    }
}

/**
 * Fix common round key formatting issues
 * @param {string} malformedKey - Malformed round key
 * @returns {string|null} Fixed round key or null if unable to fix
 */
function fixRoundKey(malformedKey) {
    if (!malformedKey || typeof malformedKey !== 'string') {
        return null;
    }
    
    console.log(`🔧 Attempting to fix round key: "${malformedKey}"`);
    
    let fixed = malformedKey;
    
    // Fix double dash issue: "0--1-0" -> "0-1-0"
    fixed = fixed.replace(/--+/g, '-');
    
    // Fix underscore separators: "0_1_0" -> "0-1-0"
    fixed = fixed.replace(/_/g, '-');
    
    // Fix dot separators: "0.1.0" -> "0-1-0"
    fixed = fixed.replace(/\./g, '-');
    
    // Remove spaces
    fixed = fixed.replace(/\s/g, '');
    
    // Handle malformed keys like "0--1-0" where there's an empty part
    const parts = fixed.split('-');
    const cleanParts = parts.filter(part => part !== '');
    
    if (cleanParts.length === 3) {
        fixed = cleanParts.join('-');
    }
    
    // Validate the result
    if (validateRoundKey(fixed)) {
        console.log(`✅ Fixed round key: "${malformedKey}" -> "${fixed}"`);
        return fixed;
    }
    
    console.log(`❌ Unable to fix round key: "${malformedKey}"`);
    return null;
}

/**
 * Process round key with backwards compatibility
 * Handles both old malformed keys and new standard keys
 * @param {string} roundKey - Round key to process
 * @returns {object} Parsed round key data with original and fixed keys
 */
function processRoundKey(roundKey) {
    const result = {
        original: roundKey,
        fixed: null,
        isValid: false,
        dayIndex: null,
        classIndex: null,
        roundIndex: null,
        needsFix: false
    };
    
    // Check if already valid
    if (validateRoundKey(roundKey)) {
        result.fixed = roundKey;
        result.isValid = true;
        result.needsFix = false;
        
        try {
            const parsed = parseRoundKey(roundKey);
            result.dayIndex = parsed.dayIndex;
            result.classIndex = parsed.classIndex;
            result.roundIndex = parsed.roundIndex;
        } catch (error) {
            console.error('Error parsing valid round key:', error);
        }
    } else {
        // Try to fix the key
        const fixed = fixRoundKey(roundKey);
        if (fixed) {
            result.fixed = fixed;
            result.isValid = true;
            result.needsFix = true;
            
            try {
                const parsed = parseRoundKey(fixed);
                result.dayIndex = parsed.dayIndex;
                result.classIndex = parsed.classIndex;
                result.roundIndex = parsed.roundIndex;
            } catch (error) {
                console.error('Error parsing fixed round key:', error);
                result.isValid = false;
            }
        }
    }
    
    return result;
}

/**
 * Scan and report round key issues in running orders
 * @param {string} trialId - Trial ID to scan
 * @returns {Promise<object>} Report of issues found
 */
async function scanRunningOrderKeys(trialId) {
    try {
        console.log(`🔍 Scanning running order keys for trial: ${trialId}`);
        
        const orderDoc = await db.collection('running_orders').doc(trialId).get();
        if (!orderDoc.exists) {
            return { error: 'No running order found' };
        }
        
        const data = orderDoc.data();
        const report = {
            trialId,
            validKeys: [],
            invalidKeys: [],
            fixableKeys: [],
            unfixableKeys: [],
            totalKeys: 0
        };
        
        // Check different possible data structures
        const dataToCheck = data.finalizedRunningOrders || data.generatedSheets || data.roundOrders || {};
        
        Object.keys(dataToCheck).forEach(roundKey => {
            report.totalKeys++;
            
            if (validateRoundKey(roundKey)) {
                report.validKeys.push(roundKey);
            } else {
                report.invalidKeys.push(roundKey);
                
                const fixed = fixRoundKey(roundKey);
                if (fixed) {
                    report.fixableKeys.push({ original: roundKey, fixed });
                } else {
                    report.unfixableKeys.push(roundKey);
                }
            }
        });
        
        console.log('📊 Round key scan results:', report);
        return report;
        
    } catch (error) {
        console.error('Error scanning round keys:', error);
        return { error: error.message };
    }
}

/**
 * Fix round keys in running orders for a trial
 * @param {string} trialId - Trial ID to fix
 * @param {boolean} dryRun - If true, don't actually update, just report what would be done
 * @returns {Promise<object>} Results of the fix operation
 */
async function fixRunningOrderKeys(trialId, dryRun = true) {
    try {
        console.log(`🔧 ${dryRun ? 'DRY RUN: ' : ''}Fixing running order keys for trial: ${trialId}`);
        
        const orderDoc = await db.collection('running_orders').doc(trialId).get();
        if (!orderDoc.exists) {
            return { error: 'No running order found' };
        }
        
        const data = orderDoc.data();
        const updates = {};
        const results = {
            trialId,
            fixed: [],
            skipped: [],
            errors: [],
            dryRun
        };
        
        // Process different possible data structures
        ['finalizedRunningOrders', 'generatedSheets', 'roundOrders'].forEach(fieldName => {
            if (data[fieldName]) {
                updates[fieldName] = {};
                
                Object.entries(data[fieldName]).forEach(([roundKey, roundData]) => {
                    if (validateRoundKey(roundKey)) {
                        // Key is already valid, keep as-is
                        updates[fieldName][roundKey] = roundData;
                        results.skipped.push(roundKey);
                    } else {
                        // Try to fix the key
                        const fixed = fixRoundKey(roundKey);
                        if (fixed) {
                            updates[fieldName][fixed] = roundData;
                            results.fixed.push({ original: roundKey, fixed });
                        } else {
                            // Keep original if can't fix
                            updates[fieldName][roundKey] = roundData;
                            results.errors.push(`Unable to fix key: ${roundKey}`);
                        }
                    }
                });
            }
        });
        
        // Apply updates if not dry run
        if (!dryRun && results.fixed.length > 0) {
            await db.collection('running_orders').doc(trialId).update(updates);
            console.log(`✅ Updated ${results.fixed.length} round keys in running orders`);
        }
        
        console.log('🔧 Fix results:', results);
        return results;
        
    } catch (error) {
        console.error('Error fixing round keys:', error);
        return { error: error.message };
    }
}

/**
 * Fix round keys in scores collection
 * @param {string} trialId - Trial ID to fix scores for
 * @param {boolean} dryRun - If true, don't actually update
 * @returns {Promise<object>} Results of the fix operation
 */
async function fixScoreKeys(trialId, dryRun = true) {
    try {
        console.log(`🔧 ${dryRun ? 'DRY RUN: ' : ''}Fixing score keys for trial: ${trialId}`);
        
        const scoresSnapshot = await db.collection('scores')
            .where('trialId', '==', trialId)
            .get();
        
        const results = {
            trialId,
            fixed: [],
            skipped: [],
            errors: [],
            dryRun
        };
        
        const batch = db.batch();
        let batchCount = 0;
        
        scoresSnapshot.forEach(doc => {
            const data = doc.data();
            const roundKey = data.roundKey;
            
            if (!roundKey) {
                results.errors.push(`Score document ${doc.id} has no roundKey`);
                return;
            }
            
            if (validateRoundKey(roundKey)) {
                results.skipped.push(roundKey);
                return;
            }
            
            const fixed = fixRoundKey(roundKey);
            if (fixed) {
                if (!dryRun) {
                    batch.update(doc.ref, { roundKey: fixed });
                    batchCount++;
                }
                results.fixed.push({ docId: doc.id, original: roundKey, fixed });
            } else {
                results.errors.push(`Unable to fix roundKey in doc ${doc.id}: ${roundKey}`);
            }
        });
        
        // Commit batch if not dry run
        if (!dryRun && batchCount > 0) {
            await batch.commit();
            console.log(`✅ Updated ${batchCount} score documents`);
        }
        
        console.log('🔧 Score fix results:', results);
        return results;
        
    } catch (error) {
        console.error('Error fixing score keys:', error);
        return { error: error.message };
    }
}

/**
 * Universal function to handle round keys with backwards compatibility
 * Use this in all your existing code to handle both old and new formats
 * @param {string} roundKey - Round key to process
 * @returns {object|null} Parsed indices or null if invalid
 */
function getRoundKeyIndices(roundKey) {
    const processed = processRoundKey(roundKey);
    
    if (processed.isValid) {
        if (processed.needsFix) {
            console.warn(`⚠️ Using fixed round key: "${processed.original}" -> "${processed.fixed}"`);
        }
        
        return {
            dayIndex: processed.dayIndex,
            classIndex: processed.classIndex,
            roundIndex: processed.roundIndex,
            standardKey: processed.fixed
        };
    }
    
    console.error(`❌ Invalid round key: "${roundKey}"`);
    return null;
}

        // ========================================
        // TIMEZONE-SAFE DATE UTILITIES
        // ========================================

        function createLocalDate(dateStr) {
            if (!dateStr) return null;
            if (typeof dateStr === 'string') {
                const dateWithTime = dateStr.includes('T') ? dateStr : dateStr + 'T12:00:00';
                return new Date(dateWithTime);
            }
            return new Date(dateStr);
        }

        function formatLocalDate(date) {
            if (!date || !(date instanceof Date)) return '';
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getDateFromFirebase(firebaseDate) {
            if (!firebaseDate) return '';
            let date;
            if (firebaseDate.toDate) {
                date = firebaseDate.toDate();
            } else if (firebaseDate instanceof Date) {
                date = firebaseDate;
            } else if (typeof firebaseDate === 'string') {
                date = createLocalDate(firebaseDate);
            } else {
                return '';
            }
            return formatLocalDate(date);
        }

        // Load running order for selected trial
        async function loadTrialRunningOrder() {

                document.getElementById('roundsGrid').innerHTML = '<div class="no-entries">Please select a trial to view running orders.</div>';

                if (currentTrial.days && Array.isArray(currentTrial.days)) {
                    currentTrial.days = currentTrial.days.map(day => ({
                        ...day,
                        date: day.date ? getDateFromFirebase(day.date) : null
                    }));

                const entriesSnapshot = await db.collection('entries')
                    .where('trialId', '==', trialId)

        // Process entries into running order structure
        async function processEntriesIntoRunningOrder(entriesSnapshot, existingOrder) {
            runningOrderData = {};
            originalOrderData = {};

            console.log('🔍 Processing trial structure:', currentTrial);

            if (currentTrial.days) {
                currentTrial.days.forEach((day, dayIndex) => {
                    runningOrderData[dayIndex] = {
                        dayNumber: dayIndex + 1,
                        date: day.date,
                        rounds: {}
                    };
                    originalOrderData[dayIndex] = { rounds: {} };
                    
                    if (day.classes) {
                        day.classes.forEach((cls, classIndex) => {
                            const className = cls.className || cls.class || cls.CLASS_NAME || `Class ${classIndex + 1}`;
                            
                            if (cls.rounds) {
                                cls.rounds.forEach((round, roundIndex) => {
                                    const roundKey = `${dayIndex}-${classIndex}-${roundIndex}`;
                                    const roundId = `day${dayIndex + 1}_${className}_round${roundIndex + 1}`.replace(/\s+/g, '_');
                                    const judgeName = round.judgeName || round.judge || round.JUDGE_NAME || 'Judge TBD';
                                    
                                    runningOrderData[dayIndex].rounds[roundKey] = {
                                        id: roundId,
                                        className: className,
                                        roundNumber: roundIndex + 1,
                                        judgeName: judgeName,
                                        entries: []
                                    };
                                    
                                    originalOrderData[dayIndex].rounds[roundKey] = { entries: [] };
                                });
                            }
                        });
                    }
                });
            }

            if (!entriesSnapshot.empty) {
                entriesSnapshot.forEach(doc => {
                    const entry = doc.data();
                    
                    if (entry.selectedEntries) {
                        entry.selectedEntries.forEach(selectedEntry => {
                            const dayIndex = selectedEntry.dayIndex;
                            let classIndex = currentTrial.days[dayIndex].classes.findIndex(c => {
                                const clsName = c.className || c.class || c.CLASS_NAME || '';
                                return clsName === selectedEntry.className;
                            });

                            let finalClassIndex;
                            if (classIndex !== -1) {
                                finalClassIndex = classIndex;
                            } else if (selectedEntry.classIndex !== undefined && selectedEntry.classIndex !== -1) {
                                finalClassIndex = selectedEntry.classIndex;
                            } else {
                                finalClassIndex = 0;
                            }

                            if (finalClassIndex >= currentTrial.days[dayIndex].classes.length) {
                                finalClassIndex = 0;
                            }

                            const roundKey = `${dayIndex}-${finalClassIndex}-${selectedEntry.roundIndex}`;
                            
                            if (runningOrderData[dayIndex] && runningOrderData[dayIndex].rounds[roundKey]) {
                                const entryItem = {
                                    id: doc.id + '_' + selectedEntry.entryId,
                                    handlerName: entry.handlerName.split(' ')[0],
                                    dogCallName: entry.dogCallName,
                                    entryType: selectedEntry.type,
                                    originalOrder: runningOrderData[dayIndex].rounds[roundKey].entries.length
                                };
                                runningOrderData[dayIndex].rounds[roundKey].entries.push(entryItem);
                                originalOrderData[dayIndex].rounds[roundKey].entries.push({ ...entryItem });
                            }
                        });
                    }
                });
            }

            Object.keys(existingOrder).forEach(roundKey => {
                const [dayIndex] = roundKey.split('-').map(Number);
                if (runningOrderData[dayIndex] && runningOrderData[dayIndex].rounds[roundKey] && existingOrder[roundKey]) {
                    const round = runningOrderData[dayIndex].rounds[roundKey];
                    const orderedEntries = [];
                    const unorderedEntries = [...round.entries];

                    existingOrder[roundKey].forEach(savedEntryId => {
                        const entryIndex = unorderedEntries.findIndex(e => e.id === savedEntryId);
                        if (entryIndex !== -1) {
                            orderedEntries.push(unorderedEntries.splice(entryIndex, 1)[0]);
                        }
                    });

                    orderedEntries.push(...unorderedEntries);
                    round.entries = orderedEntries;
                }
            });

            renderDayTabs();
            renderRunningOrder();
        }

        // Handle drag and drop end
        function handleDragEnd(roundKey, oldIndex, newIndex) {
            if (oldIndex !== newIndex) {
                const dayData = runningOrderData[currentDay];
                const entries = dayData.rounds[roundKey].entries;
                const movedEntry = entries.splice(oldIndex, 1)[0];
                entries.splice(newIndex, 0, movedEntry);
                
                console.log(`Moved entry from position ${oldIndex} to ${newIndex} in round ${roundKey}`);
                showStatus('Entry order updated', 'success');
            }
        }

        // Move entry up
        function moveEntryUp(roundKey, index) {
            if (index > 0) {
                const dayData = runningOrderData[currentDay];
                const entries = dayData.rounds[roundKey].entries;
                [entries[index - 1], entries[index]] = [entries[index], entries[index - 1]];
                renderRunningOrder();
                showStatus('Entry moved up', 'success');
            }
        }

        // Move entry down
        function moveEntryDown(roundKey, index) {
            const dayData = runningOrderData[currentDay];
            const entries = dayData.rounds[roundKey].entries;
            if (index < entries.length - 1) {
                [entries[index], entries[index + 1]] = [entries[index + 1], entries[index]];
                renderRunningOrder();
                showStatus('Entry moved down', 'success');
            }
        }

        // Randomize running orders for current day
        function randomizeAllOrders() {
            if (confirm('This will randomize the running order for ALL rounds on the current day. Continue?')) {
                const dayData = runningOrderData[currentDay];
                Object.keys(dayData.rounds).forEach(roundKey => {
                    const entries = dayData.rounds[roundKey].entries;
                    for (let i = entries.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [entries[i], entries[j]] = [entries[j], entries[i]];
                    }
                });
                renderRunningOrder();
                showStatus('Running orders randomized for current day', 'success');
            }
        }

        // Sort alphabetically by handler name for current day
        function sortAlphabetically() {
            if (confirm('This will sort all entries alphabetically by handler name for the current day. Continue?')) {
                const dayData = runningOrderData[currentDay];
                Object.keys(dayData.rounds).forEach(roundKey => {
                    dayData.rounds[roundKey].entries.sort((a, b) => 
                        a.handlerName.localeCompare(b.handlerName)
                    );
                });
                renderRunningOrder();
                showStatus('Entries sorted alphabetically for current day', 'success');
            }
        }

        // Reset to original entry order for current day
        function resetToOriginal() {
            if (confirm('This will reset all running orders to the original entry order for the current day. Continue?')) {
                const dayData = runningOrderData[currentDay];
                const originalDayData = originalOrderData[currentDay];
                Object.keys(originalDayData.rounds).forEach(roundKey => {
                    if (dayData.rounds[roundKey]) {
                        dayData.rounds[roundKey].entries = [...originalDayData.rounds[roundKey].entries];
                    }
                });
                renderRunningOrder();
                showStatus('Running orders reset to original entry order for current day', 'success');

                const roundOrders = {};

        // Export running order to Excel
        async function exportRunningOrder() {
            if (!currentTrial || Object.keys(runningOrderData).length === 0) {
                showStatus('No running order data to export', 'error');
                return;
            }

            try {
                showStatus('Preparing Excel export...', 'info');

                const dayData = runningOrderData[currentDay];
                if (!dayData) {
                    showStatus('No data for current day', 'error');
                    return;
                }

                let csvContent = "data:text/csv;charset=utf-8,";
                
                const rounds = Object.values(dayData.rounds);
                const maxEntries = Math.max(...rounds.map(r => r.entries.length));
                
                csvContent += rounds.map(round => 
                    `"${dayData.date ? createLocalDate(dayData.date).toLocaleDateString() : 'Date TBD'}"`
                ).join(',') + '\n';
                
                csvContent += rounds.map(round => 
                    `"${round.judgeName}"`
                ).join(',') + '\n';
                
                csvContent += rounds.map(round => 
                    `"${round.className} Round ${round.roundNumber}"`
                ).join(',') + '\n';

                for (let i = 0; i < maxEntries; i++) {
                    csvContent += rounds.map(round => 
                        round.entries[i] ? `"${round.entries[i].handlerName} - ${round.entries[i].dogCallName}"` : '""'
                    ).join(',') + '\n';
                }

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                
                const dayDate = dayData.date ? createLocalDate(dayData.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : `Day-${dayData.dayNumber}`;
                link.setAttribute("download", `running-order-${currentTrial.clubName.replace(/\s+/g, '-')}-${dayDate}.csv`);
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showStatus('Running order exported successfully!', 'success');
            } catch (error) {
                console.error('Error exporting running order:', error);
                showStatus('Error exporting running order: ' + error.message, 'error');
            }
        }

            // Scent locations section

                x: 50,
                y: faultsY,
                size: 8,
                font: font,
            });
            page.drawText('Disturbing search area by dog or handler; Verbally naming item; Continue search after "alert";', {
                x: 50,
                y: faultsY - 12,
                size: 8,
                font: font,
            });
            page.drawText('SR crossing line less than half.', {
                x: 50,
                y: faultsY - 24,
                size: 8,
                font: font,
            });

            // Table - adjusted to fit page width better
            const tableY = height - 250;
            const tableWidth = width - 100; // Leave 50px margin on each side
            const colWidths = [110, 50, 50, 50, 50, 60, 60, 50, 60]; // Adjusted column widths
            let currentX = 50;

            const headers = ['Team Dog - Handler', 'Scent 1', 'Scent 2', 'Scent 3', 'Scent 4', 'Fault', 'Fault', 'Time', 'Pass/Fail'];
            
            // Draw table headers
            headers.forEach((header, index) => {
                page.drawRectangle({
                    x: currentX,
                    y: tableY,
                    width: colWidths[index],
                    height: 20,
                    borderColor: PDFLib.rgb(0, 0, 0),
                    borderWidth: 1,
                });
                
                // Center text in header cells
                const textWidth = header.length * 4; // Approximate text width
                const textX = currentX + (colWidths[index] - textWidth) / 2;
                page.drawText(header, {
                    x: Math.max(currentX + 2, textX),
                    y: tableY + 6,
                    size: 7,
                    font: boldFont,
                });
                
                currentX += colWidths[index];
            });

            // Entry rows
            let rowY = tableY;
            round.entries.forEach((entry, index) => {
                rowY -= 25;
                currentX = 50;

                // Draw all cells for this row
                colWidths.forEach((width, colIndex) => {
                    page.drawRectangle({
                        x: currentX,
                        y: rowY,
                        width: width,
                        height: 25,
                        borderColor: PDFLib.rgb(0, 0, 0),
                        borderWidth: 1,
                    });

                    // Fill in team name for first column
                    if (colIndex === 0) {
                        const teamText = `${entry.handlerName} - ${entry.dogCallName}`;
                        page.drawText(teamText, {
                            x: currentX + 3,
                            y: rowY + 8,
                            size: 8,
                            font: font,
                        });
                    }
                    
                    currentX += width;
                });
            });

            // Judge signature section
            const sigY = Math.max(rowY - 60, 80);
            page.drawText(`Judge: ${round.judgeName}`, {
                x: 50,
                y: sigY,
                size: 12,
                font: boldFont,
            });
            
            page.drawText('Signature: ________________________________', {
                x: 250,
                y: sigY,
                size: 10,
                font: font,
            });

            // Copyright at bottom
            page.drawText('Copyright © by Canine–Work And Games, LLC, 2024', {
                x: 50,
                y: 30,
                size: 8,
                font: font,
            });
        }

        // Preview score sheet format
        async function previewScoreSheet() {
            try {
                showStatus('Generating preview...', 'info');
                
                // Create a sample round for preview
                const sampleRound = {
                    className: 'Sample Class',
                    roundNumber: 1,
                    judgeName: 'Sample Judge',
                    entries: [
                        { handlerName: 'John', dogCallName: 'Buddy', entryType: 'regular' },
                        { handlerName: 'Jane', dogCallName: 'Luna', entryType: 'regular' },
                        { handlerName: 'Bob', dogCallName: 'Max', entryType: 'feo' }
                    ]
                };

                const sampleDay = {
                    date: formatLocalDate(new Date())
                };

                const pdfDoc = await PDFLib.PDFDocument.create();
                const page = pdfDoc.addPage([612, 792]);
                
                await createScoreSheetPage(pdfDoc, page, sampleRound, sampleDay);
                
                const pdfBytes = await pdfDoc.save();
                downloadPDF(pdfBytes, 'ScoreSheet_Preview.pdf');
                
                showStatus('Preview generated successfully!', 'success');
            } catch (error) {
                console.error('Error generating preview:', error);
                showStatus('Error generating preview: ' + error.message, 'error');
            }
        }

        // Download PDF helper function
        function downloadPDF(pdfBytes, filename) {
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing enhanced running order management...');
            init();
        });

        console.log('Enhanced Running Order Management with Score Sheets script loaded successfully');
    </script>
