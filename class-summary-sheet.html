<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Summary Sheet - Enhanced</title>
    
    <!-- Firebase SDKs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-firestore-compat.min.js"></script>
    
    <!-- SheetJS for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- JSZip for ZIP file creation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .control-row {
            display: flex;
            gap: 1rem;
            align-items: end;
            margin-bottom: 1rem;
        }

        .control-group {
            flex: 1;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }

        .control-group select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
        }

        .btn-warning {
            background: #ffc107;
            color: #212529;
        }

        .btn-info {
            background: #17a2b8;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .summary-container {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            display: none;
        }

        .summary-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 1rem;
        }

        .summary-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .summary-info {
            color: #6c757d;
            font-size: 1.1rem;
        }

        .debug-info {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .summary-table-container {
            overflow-x: auto;
            margin-bottom: 2rem;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .summary-table th,
        .summary-table td {
            border: 1px solid #dee2e6;
            padding: 0.75rem 0.5rem;
            text-align: center;
            vertical-align: middle;
        }

        .summary-table th {
            background: #f8f9fa;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .participant-cwags {
            text-align: left !important;
            font-weight: 600;
            background: #f0f8ff;
            min-width: 120px;
            max-width: 120px;
            font-size: 0.85rem;
            position: sticky;
            left: 0;
            z-index: 5;
        }

        .participant-dog {
            text-align: left !important;
            font-weight: 600;
            background: #f0f8ff;
            min-width: 100px;
            max-width: 100px;
            font-size: 0.9rem;
            position: sticky;
            left: 120px;
            z-index: 5;
        }

        .participant-handler {
            text-align: left !important;
            font-weight: 600;
            background: #f0f8ff;
            min-width: 140px;
            max-width: 140px;
            font-size: 0.9rem;
            position: sticky;
            left: 220px;
            z-index: 5;
        }

        .round-header {
            min-width: 100px;
            max-width: 120px;
            font-size: 0.85rem;
            line-height: 1.2;
        }

        .judge-name {
            font-weight: bold;
            color: #2c3e50;
        }

        .round-date {
            color: #6c757d;
            font-size: 0.8rem;
        }

        .round-info {
            color: #495057;
            font-size: 0.8rem;
        }

        .result-cell {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .result-pass {
            color: #28a745;
        }

        .result-fail {
            color: #dc3545;
        }

        .result-absent {
            color: #6c757d;
        }

        .result-scheduled {
            color: #007bff;
        }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid #e9ecef;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #6c757d;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .status-message {
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 8px;
            display: none;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-info {
            background: #cce7ff;
            color: #0056b3;
            border: 1px solid #99d3ff;
        }

        .no-data {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 3rem;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .export-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .progress-container {
            background: #e9ecef;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            display: none;
        }

        .progress-bar {
            background: #667eea;
            height: 20px;
            border-radius: 5px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .control-row {
                flex-direction: column;
            }
            
            .export-buttons {
                flex-direction: column;
            }
            
            .summary-table {
                font-size: 0.8rem;
            }
            
            .participant-name {
                min-width: 150px;
                max-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>📊 Class Summary Sheet</h1>
                <p>Track competitor progress across all rounds of a class</p>
            </div>
            <div>
                <a href="trial-secretary-dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
            </div>
        </div>

        <!-- Status Message -->
        <div class="status-message" id="statusMessage"></div>

        <!-- Progress Container -->
        <div class="progress-container" id="progressContainer">
            <div>Processing classes...</div>
            <div class="progress-bar" id="progressBar">0%</div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label for="trialSelect">Select Trial:</label>
                    <select id="trialSelect">
                        <option value="">Loading trials...</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="classSelect">Select Class:</label>
                    <select id="classSelect">
                        <option value="">Select a trial first</option>
                    </select>
                </div>
                <button class="btn" id="generateBtn">📋 Generate Summary</button>
            </div>
            <!-- Debug button for testing -->
            <button id="forceReloadBtn" class="btn btn-info" style="margin-top: 10px;">🔄 Force Reload Trials</button>
        </div>

        <!-- Debug Info -->
        <div class="debug-info" id="debugInfo" style="display: none;">
            <strong>Debug Information:</strong>
            <div id="debugContent"></div>
        </div>

        <!-- Summary Container -->
        <div class="summary-container" id="summaryContainer">
            <div class="summary-header">
                <div class="summary-title" id="summaryTitle">Class Summary</div>
                <div class="summary-info" id="summaryInfo">Trial • Class • Total Participants</div>
            </div>

            <div class="summary-table-container">
                <table class="summary-table" id="summaryTable">
                    <thead id="summaryTableHead">
                        <!-- Table headers will be generated here -->
                    </thead>
                    <tbody id="summaryTableBody">
                        <!-- Table body will be generated here -->
                    </tbody>
                </table>
            </div>

            <div class="stats-section" id="statsSection">
                <!-- Statistics will be generated here -->
            </div>

            <div class="export-buttons">
                <button class="btn btn-success" id="exportCSVBtn">📄 Export CSV</button>
                <button class="btn btn-info" id="exportExcelBtn">📊 Export Excel</button>
                <button class="btn btn-warning" id="exportPDFBtn">📑 Export PDF</button>
            </div>
        </div>

        <!-- No Data Message -->
        <div class="no-data" id="noDataMessage" style="display: none;">
            <h3>📋 No Data Available</h3>
            <p>Please select a trial and class to generate the summary.</p>
        </div>
    </div>

    <script>
        console.log('🎯 Enhanced Script starting...');

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBWpyM_lEpqdQWuKuLLZiW1SlloWsWkJCs",
            authDomain: "dog-trialing-system.firebaseapp.com",
            projectId: "dog-trialing-system",
            storageBucket: "dog-trialing-system.firebasestorage.app",
            messagingSenderId: "490812593982",
            appId: "1:490812593982:web:344776707566f8d9027e6f",
            measurementId: "G-EMLX58Y278"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        console.log('🔥 Firebase initialized');

        // ===== GLOBAL VARIABLES =====
        let summaryData = null;
        let currentTrial = null;
        let currentClass = null;
        let currentUser = null;
        let allClassSummaries = {};
        let allClassNames = [];
        let entriesData = {};

        // C-WAGS class order mapping
        const CWAGS_CLASS_ORDER = {
            'PATROL 1': 1, 'PATROL1': 1, 'P1': 1,
            'DETECTIVE 2': 2, 'DETECTIVE2': 2, 'DET2': 2, 'D2': 2,
            'INVESTIGATOR 3': 3, 'INVESTIGATOR3': 3, 'INV3': 3, 'I3': 3,
            'SUPER SLEUTH 4': 4, 'SUPER SLEUTH4': 4, 'SUPERSLEUTH4': 4, 'SS4': 4, 'S4': 4,
            'PRIVATE INV': 5, 'PRIVATE INVESTIGATOR': 5, 'PRIVATEINV': 5, 'PRIV INV': 5, 'PI': 5,
            'DET DIVERSIONS': 6, 'DETECTIVE DIVERSIONS': 6, 'DETDIVERSIONS': 6, 'DD': 6,
            'RANGER 1': 7, 'RANGER1': 7, 'R1': 7,
            'RANGER 2': 8, 'RANGER2': 8, 'R2': 8,
            'RANGER 3': 9, 'RANGER3': 9, 'R3': 9,
            'RANGER 4': 10, 'RANGER4': 10, 'R4': 10,
            'RANGER 5': 11, 'RANGER5': 11, 'R5': 11,
            'DASHER 3': 12, 'DASHER3': 12, 'DASH3': 12, 'DA3': 12,
            'DASHER 4': 13, 'DASHER4': 13, 'DASH4': 13, 'DA4': 13,
            'DASHER 5': 14, 'DASHER5': 14, 'DASH5': 14, 'DA5': 14,
            'DASHER 6': 15, 'DASHER6': 15, 'DASH6': 15, 'DA6': 15
        };

        // ===== UTILITY FUNCTIONS =====
        function getDateFromFirebase(dateValue) {
            if (!dateValue) return null;
            if (dateValue.toDate) {
                return dateValue.toDate().toISOString().split('T')[0];
            }
            if (typeof dateValue === 'string') {
                return dateValue;
            }
            return null;
        }

        function getDateFromRound(round) {
            if (!round.roundKey) return 'Date TBD';
            const roundKeyParts = round.roundKey.split('-').map(Number);
            const dayIndex = roundKeyParts[0];
            const dayDate = currentTrial.days && currentTrial.days[dayIndex] 
                ? getDateFromFirebase(currentTrial.days[dayIndex].date) 
                : 'Date TBD';
            return dayDate ? new Date(dayDate + 'T12:00:00').toLocaleDateString() : 'Date TBD';
        }

        function isFeoEntry(entryType) {
            if (!entryType) return false;
            const typeStr = entryType.toString().toLowerCase().trim();
            return typeStr === 'feo' || typeStr === 'for exhibition only' || typeStr === 'exhibition';
        }

        function getCWAGSClassOrder(className) {
            if (!className) return 999;
            
            const cleanClassName = className.toUpperCase()
                .replace(/[^A-Z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
            
            if (CWAGS_CLASS_ORDER[cleanClassName]) {
                return CWAGS_CLASS_ORDER[cleanClassName];
            }
            
            const noSpaceClassName = cleanClassName.replace(/\s/g, '');
            if (CWAGS_CLASS_ORDER[noSpaceClassName]) {
                return CWAGS_CLASS_ORDER[noSpaceClassName];
            }
            
            for (const code in CWAGS_CLASS_ORDER) {
                if (cleanClassName.includes(code) || code.includes(cleanClassName)) {
                    return CWAGS_CLASS_ORDER[code];
                }
            }
            
            return 999;
        }

        function createHeaderCell(text, className, rowspan) {
            const cell = document.createElement('th');
            cell.textContent = text;
            if (className) {
                cell.className = className;
            }
            if (rowspan && rowspan > 1) {
                cell.rowSpan = rowspan;
            }
            return cell;
        }

        function createDataCell(content, className) {
            const cell = document.createElement('td');
            cell.textContent = content;
            if (className) {
                cell.className = className;
            }
            return cell;
        }

        function showStatus(message, type) {
            console.log('Status (' + type + '): ' + message);
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = 'status-message status-' + type;
            statusDiv.style.display = 'block';
            
            setTimeout(function() {
                statusDiv.style.display = 'none';
            }, 5000);
        }

        function showProgress(show, percent, message) {
            percent = percent || 0;
            message = message || '';
            const container = document.getElementById('progressContainer');
            const bar = document.getElementById('progressBar');
            
            if (show) {
                container.style.display = 'block';
                bar.style.width = percent + '%';
                bar.textContent = percent + '% - ' + message;
            } else {
                container.style.display = 'none';
            }
        }

        function showDebug(message) {
            console.log('Debug:', message);
            const debugDiv = document.getElementById('debugInfo');
            const debugContent = document.getElementById('debugContent');
            debugContent.innerHTML = message;
            debugDiv.style.display = 'block';
        }

        function createLocalDate(dateStr) {
            if (!dateStr) return null;
            if (typeof dateStr === 'string') {
                const dateWithTime = dateStr.includes('T') ? dateStr : dateStr + 'T12:00:00';
                return new Date(dateWithTime);
            }
            return new Date(dateStr);
        }

        function formatLocalDate(date) {
            if (!date || !(date instanceof Date)) return '';
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return year + '-' + month + '-' + day;
        }

        // ===== ENHANCED RESULT PROCESSING =====
        function processParticipantResult(participantResult) {
            // Check for enhanced numerical scoring (Rally, Games, Obedience)
            if (participantResult.numericalScore !== undefined && participantResult.passIndicator !== undefined) {
                console.log('📊 Found numerical score:', participantResult.numericalScore, 'Pass indicator:', participantResult.passIndicator);
                
                if (participantResult.passIndicator && participantResult.passIndicator.trim() !== '') {
                    // Show actual pass indicator instead of just "P"
                    return { result: participantResult.passIndicator, cssClass: 'result-pass' };
                } else if (participantResult.numericalScore !== undefined && participantResult.numericalScore !== '') {
                    return { result: 'F', cssClass: 'result-fail' };
                }
            }
            
            // Check for traditional scent work scoring
            if (participantResult.passFail) {
                if (participantResult.passFail === 'Pass') {
                    return { result: 'P', cssClass: 'result-pass' };
                } else if (participantResult.passFail === 'Fail') {
                    return { result: 'F', cssClass: 'result-fail' };
                }
            }
            
            return { result: '-', cssClass: 'result-absent' };
        }

        // ===== FEO + ORPHANED SCORE DETECTION =====
        function shouldExcludeParticipantEnhanced(participant, participantId) {
            // First check for orphaned scores (deleted entries)
            const docIdParts = participantId.split('_');
            const docId = docIdParts[0];
            const originalEntry = entriesData[docId];
            
            if (!originalEntry) {
                console.log('🚫 ORPHANED SCORE detected (entry deleted): ' + participantId);
                return true; // Skip orphaned scores from deleted entries
            }

            // Check multiple possible FEO indicators
            if (participant.entryType && isFeoEntry(participant.entryType)) {
                console.log('🚫 FEO detected via entryType: ' + participantId + ' (' + participant.entryType + ')');
                return true;
            }

            if (participant.type && isFeoEntry(participant.type)) {
                console.log('🚫 FEO detected via type: ' + participantId + ' (' + participant.type + ')');
                return true;
            }

            if (participantId && participantId.toLowerCase().includes('feo')) {
                console.log('🚫 FEO detected in participantId: ' + participantId);
                return true;
            }

            if (participant.comments && participant.comments.toLowerCase().includes('feo')) {
                console.log('🚫 FEO detected in comments: ' + participantId + ' (' + participant.comments + ')');
                return true;
            }

            // Check original entries data for FEO status
            if (originalEntry.selectedEntries) {
                const parts = participantId.split('_');
                if (parts.length > 1) {
                    const entryDetails = parts[1];
                    let parsedClassName = '';
                    
                    // Parse class name from entry details
                    const classNames = [
                        'Patrol 1', 'Detective 2', 'Investigator 3', 'Super Sleuth 4',
                        'Private Inv', 'Det Diversions', 'Ranger 1', 'Ranger 2', 
                        'Ranger 3', 'Ranger 4', 'Ranger 5', 'Dasher 3', 'Dasher 4', 
                        'Dasher 5', 'Dasher 6'
                    ];
                    
                    for (let i = 0; i < classNames.length; i++) {
                        if (entryDetails.includes(classNames[i])) {
                            parsedClassName = classNames[i];
                            break;
                        }
                    }

                    if (parsedClassName) {
                        const matchingEntry = originalEntry.selectedEntries.find(function(se) {
                            return se.className === parsedClassName;
                        });
                        if (matchingEntry && matchingEntry.type && isFeoEntry(matchingEntry.type)) {
                            console.log('🚫 FEO detected via original entries: ' + participantId + ' (' + matchingEntry.type + ')');
                            return true;
                        }
                    }
                }
            }

            return false;
        }
 // ===== INITIALIZATION FUNCTIONS =====
        async function init() {
            try {
                console.log('🚀 Initializing enhanced application...');
                
                await new Promise(function(resolve, reject) {
                    const unsubscribe = auth.onAuthStateChanged(async function(user) {
                        unsubscribe();
                        console.log('👤 Auth state changed:', user ? 'User found' : 'No user');
                        
                        if (user) {
                            try {
                                console.log('📋 Fetching user profile...');
                                const userDoc = await db.collection('users').doc(user.uid).get();
                                if (userDoc.exists) {
                                    currentUser = { uid: user.uid, ...userDoc.data() };
                                    console.log('✅ User profile loaded');
                                    resolve();
                                } else {
                                    console.error('❌ User profile not found');
                                    reject(new Error('User profile not found'));
                                }
                            } catch (error) {
                                console.error('❌ Error fetching user profile:', error);
                                reject(error);
                            }
                        } else {
                            console.log('🔄 Redirecting to login...');
                            window.location.href = 'index.html';
                        }
                    });
                });

                console.log('📊 Loading trials...');
                await loadTrials();
                console.log('✅ Enhanced application initialized successfully');
                
            } catch (error) {
                console.error('❌ Error initializing:', error);
                showStatus('Error initializing application: ' + error.message, 'error');
            }
        }

        async function loadTrials() {
            try {
                console.log('🔍 Loading trials for user:', currentUser ? currentUser.uid : 'none');
                showStatus('Loading your trials...', 'info');

                const trialsSnapshot = await db.collection("trials")
                    .where("createdBy", "==", currentUser.uid)
                    .get();

                console.log('📊 Found', trialsSnapshot.size, 'trials');

                const trialSelect = document.getElementById('trialSelect');
                trialSelect.innerHTML = '<option value="">Select a trial...</option>';

                if (!trialsSnapshot.empty) {
                    const trials = [];
                    trialsSnapshot.forEach(function(doc) {
                        trials.push({ id: doc.id, ...doc.data() });
                    });

                    trials.sort(function(a, b) {
                        const aTime = a.createdAt ? a.createdAt.seconds : 0;
                        const bTime = b.createdAt ? b.createdAt.seconds : 0;
                        return bTime - aTime;
                    });

                    trials.forEach(function(trial) {
                        const option = document.createElement('option');
                        option.value = trial.id;
                        
                        let trialLabel = trial.clubName || 'Unnamed Trial';
                        
                        if (trial.days && trial.days.length > 0) {
                            const dates = trial.days
                                .filter(function(day) { return day.date; })
                                .map(function(day) {
                                    const localDate = createLocalDate(day.date);
                                    return localDate.toLocaleDateString('en-US', { 
                                        month: 'short', 
                                        day: 'numeric',
                                        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
                                    });
                                })
                                .join(', ');
                            if (dates) {
                                trialLabel += ' (' + dates + ')';
                            }
                        }
                        
                        option.textContent = trialLabel;
                        trialSelect.appendChild(option);
                    });

                    showStatus('Found ' + trials.length + ' trials', 'success');
                    console.log('✅ Trials loaded successfully');
                } else {

        async function loadTrialClasses() {

            const classSelect = document.getElementById('classSelect');
            
            if (!trialId) {
                classSelect.innerHTML = '<option value="">Select a trial first</option>';
                document.getElementById('summaryContainer').style.display = 'none';
                allClassNames = [];
                return;
            }

            try {
                console.log('🔍 Loading classes for trial:', trialId);
                showStatus('Loading trial classes...', 'info');

                const trialDoc = await db.collection('trials').doc(trialId).get();
                if (!trialDoc.exists) {
                    throw new Error('Trial not found');
                }

                currentTrial = { id: trialDoc.id, ...trialDoc.data() };
                console.log('📋 Trial loaded:', currentTrial.clubName);

                // Load entries data for FEO detection
                console.log('📂 Loading entries data for FEO checking...');
                const entriesSnapshot = await db.collection('entries')
                    .where('trialId', '==', trialId)
                    .get();

                entriesData = {};
                entriesSnapshot.forEach(function(doc) {
                    entriesData[doc.id] = doc.data();
                });
                console.log('📊 Loaded ' + Object.keys(entriesData).length + ' entry documents');

                const classNames = new Set();
                
                if (currentTrial.days && Array.isArray(currentTrial.days)) {
                    currentTrial.days.forEach(function(day) {
                        if (day.classes && Array.isArray(day.classes)) {
                            day.classes.forEach(function(cls) {
                                const className = cls.className || cls.class || cls.CLASS_NAME;
                                if (className) {
                                    classNames.add(className.trim());
                                }
                            });
                        }
                    });
                }

                classSelect.innerHTML = '<option value="">Select a class...</option>';
                
                if (classNames.size > 0) {

                    selectAllOption.value = 'ALL_CLASSES';
                    selectAllOption.textContent = '📊 Select All Classes';
                    selectAllOption.style.fontWeight = 'bold';
                   selectAllOption.style.backgroundColor = '#e9ecef';
                    classSelect.appendChild(selectAllOption);
                    
                    const sortedClasses = Array.from(classNames).sort(function(a, b) {
                        const orderA = getCWAGSClassOrder(a);
                        const orderB = getCWAGSClassOrder(b);
                        return orderA - orderB;
                    });
                    
                    allClassNames = sortedClasses;
                    
                    sortedClasses.forEach(function(className) {

                    showStatus('No classes found in this trial', 'error');

                console.error('❌ Error loading trial classes:', error);
                showStatus('Error loading classes: ' + error.message, 'error');
                allClassNames = [];
            }
        }

        // ===== ENHANCED SUMMARY GENERATION =====
        async function generateSummaryForClass(className) {
            console.log('🎯 ENHANCED: Processing class "' + className + '"');
            
            if (!currentTrial) {
                console.error('No trial selected');
                return null;
            }

            const trialId = currentTrial.id;
            
            // Get scored rounds - look for BOTH traditional and numerical scoring
            const rounds = [];
            const scoresSnapshot = await db.collection('scores').get();
            
            console.log('📊 ENHANCED: Checking ' + scoresSnapshot.size + ' score documents for ' + className);
            
            let foundNumericalScores = false;
            
            scoresSnapshot.forEach(function(doc) {
                const scoreData = doc.data();
                const docId = doc.id;
                
                // Check if this document matches our class and trial
                let isMatch = false;
                
                // Method 1: roundInfo.className match
                if (scoreData.roundInfo && scoreData.roundInfo.className === className) {
                    console.log('✅ ENHANCED: Found via roundInfo: ' + docId);
                    isMatch = true;
                }
                
                // Method 2: Document ID contains trial and participants contain class
                if (!isMatch && docId.startsWith(trialId)) {
                    if (scoreData.participants) {
                        Object.keys(scoreData.participants).forEach(function(participantId) {
                            if (participantId.includes(className)) {
                                console.log('✅ ENHANCED: Found via participant ID: ' + docId);
                                isMatch = true;
                            }
                        });
                    }
                }
                
                if (isMatch) {
                    // Check if this has numerical scores
                    if (scoreData.participants) {
                        Object.values(scoreData.participants).forEach(function(scores) {
                            if (scores.numericalScore !== undefined || scores.passIndicator !== undefined) {
                                foundNumericalScores = true;
                                console.log('🔢 ENHANCED: Found numerical scoring in ' + docId);
                            }
                        });
                    }
                    
                    rounds.push({
                        id: doc.id,
                        roundKey: scoreData.roundKey,
                        judgeName: scoreData.judgeName || (scoreData.roundInfo ? scoreData.roundInfo.judgeName : null),
                        roundNumber: scoreData.roundNumber || (scoreData.roundInfo ? scoreData.roundInfo.roundNumber : null) || 1,
                        lastUpdated: scoreData.lastUpdated,
                        participants: scoreData.participants || {},
                        hasScores: true,
                        detectedClassType: scoreData.detectedClassType
                    });
                }
            });
            
            console.log('📊 ENHANCED: Found ' + rounds.length + ' rounds for ' + className + ', numerical scores: ' + foundNumericalScores);
            
            // If no scored rounds, try to get from running orders
            if (rounds.length === 0) {
                console.log('⚠️ No scores found for ' + className + ', checking running orders...');
                
                try {
                   const orderDoc = await db.collection('running_orders').doc(trialId).get();
if (orderDoc.exists) {
    const runningOrderData = orderDoc.data();
    
    // Always use finalizedRunningOrders as the primary source
    let finalizedData = runningOrderData.finalizedRunningOrders || {};
    
    // If finalizedRunningOrders doesn't exist, fall back to legacy structures
    if (Object.keys(finalizedData).length === 0) {
        console.log('⚠️ No finalizedRunningOrders found, converting from legacy structure');
        
        // Convert from roundOrders if available
        if (runningOrderData.roundOrders) {
            Object.entries(runningOrderData.roundOrders).forEach(([roundKey, participantIds]) => {
                finalizedData[roundKey] = {
                    participants: Array.isArray(participantIds) 
                        ? participantIds.map(id => ({ id }))
                        : []
                };
            });
        }
    }

                        if (finalizedData) {
                            Object.entries(finalizedData).forEach(function(entry) {
                                const roundKey = entry[0];
                                const roundData = entry[1];
                                const parts = roundKey.split('-').map(Number);
                                const dayIndex = parts[0];
                                const classIndex = parts[1];
                                const roundIndex = parts[2];
                                const day = currentTrial.days[dayIndex];
                                const cls = day ? day.classes[classIndex] : null;
                                const round = cls ? cls.rounds[roundIndex] : null;

                                if (day && cls && round) {
                                    const roundClassName = cls.className || cls.class || cls.CLASS_NAME;
                                    
                                    if (roundClassName && roundClassName.trim() === className.trim()) {
                                        let entryIds = [];
                                        if (Array.isArray(roundData)) {
                                            entryIds = roundData;
                                        } else if (roundData.entries) {
                                            entryIds = roundData.entries.map(function(entry) {
                                                return entry.entryId || entry.id;
                                            });
                                        } else if (roundData.participants) {
                                            entryIds = roundData.participants.map(function(p) {
                                                return p.entryId || p.id;
                                            });
                                        } else {
                                            entryIds = Object.values(roundData).filter(function(item) {
                                                return typeof item === 'string';
                                            });
                                        }
                                        
                                        if (entryIds && entryIds.length > 0) {
                                            const participants = [];
                                            entryIds.forEach(function(entryId) {
                                                const docId = entryId.split('_')[0];
                                                const entry = entriesData[docId];
                                                if (entry) {
                                                    let entryType = 'regular';
                                                    if (entry.selectedEntries) {
                                                        const matchingSelectedEntry = entry.selectedEntries.find(function(se) {
                                                            return entryId.includes(se.className) && entryId.includes(se.roundName);
                                                        });
                                                        if (matchingSelectedEntry && matchingSelectedEntry.type) {
                                                            entryType = matchingSelectedEntry.type;
                                                        }
                                                    }
                                                    
                                                    participants.push({
                                                        id: entryId,
                                                        handlerName: entry.handlerName || 'Unknown Handler',
                                                        dogCallName: entry.dogCallName || 'Unknown',
                                                        cwagsNumber: entry.cwagsNumber || 'TBD',
                                                        entryType: entryType
                                                    });
                                                }
                                            });

                                            if (participants.length > 0) {
                                                rounds.push({
                                                    roundKey: roundKey,
                                                    judgeName: round.judgeName || round.judge || round.JUDGE_NAME || 'Judge TBD',
                                                    roundNumber: roundIndex + 1,
                                                    className: roundClassName,
                                                    participants: participants,
                                                    hasScores: false
                                                });
                                            }
                                        }
                                    }
                                }
                            });
                        }
                    }
                } catch (orderError) {
                    console.log('No running order found or error accessing it:', orderError);
                }
            }

            if (rounds.length === 0) {
                console.log('❌ No data found for class: ' + className);
                return null;
            }

            console.log('✅ Found ' + rounds.length + ' rounds for ' + className);

            // Sort rounds
            rounds.sort(function(a, b) {
                const aKey = a.roundKey || '';
                const bKey = b.roundKey || '';
                return aKey.localeCompare(bKey);
            });

            // ENHANCED FEO + ORPHANED SCORE FILTERING
            const participantMap = new Map();
            let debugInfo = {
                totalParticipants: 0,
                feoFiltered: 0,
                orphanedFiltered: 0,
                regularIncluded: 0
            };

            rounds.forEach(function(round) {
                if (round.hasScores) {
                    Object.keys(round.participants).forEach(function(participantId) {
                        const result = round.participants[participantId];
                        
                        if (shouldExcludeParticipantEnhanced(result, participantId)) {
                            const docId = participantId.split('_')[0];
                            if (!entriesData[docId]) {
                                debugInfo.orphanedFiltered++;
                            } else {
                                debugInfo.feoFiltered++;
                            }
                            return;
                        }

                        const uniqueKey = participantId.split('_')[0];
                        debugInfo.regularIncluded++;

                        if (!participantMap.has(uniqueKey)) {
                            participantMap.set(uniqueKey, {
                                id: uniqueKey,
                                dogName: result.dogCallName || result.dogName || 'Unknown',
                                handlerName: result.handlerName || 'Unknown Handler',
                                cwagsNumber: result.cwagsNumber || 'TBD',
                                participantIds: [participantId],
                                entryType: result.entryType || 'regular'
                            });
                        } else {
                            const participant = participantMap.get(uniqueKey);
                            if (!participant.participantIds.includes(participantId)) {
                                participant.participantIds.push(participantId);
                            }
                        }
                    });
                } else {
                    if (round.participants && Array.isArray(round.participants)) {
                        round.participants.forEach(function(participant) {
                            if (shouldExcludeParticipantEnhanced(participant, participant.id)) {
                                const docId = participant.id.split('_')[0];
                                if (!entriesData[docId]) {
                                    debugInfo.orphanedFiltered++;
                                } else {
                                    debugInfo.feoFiltered++;
                                }
                                return;
                            }

                            debugInfo.regularIncluded++;
                            const uniqueKey = participant.id.split('_')[0];

                            if (!participantMap.has(uniqueKey)) {
                                participantMap.set(uniqueKey, {
                                    id: uniqueKey,
                                    dogName: participant.dogCallName || 'Unknown',
                                    handlerName: participant.handlerName || 'Unknown Handler',
                                    cwagsNumber: participant.cwagsNumber || 'TBD',
                                    participantIds: [participant.id],
                                    entryType: participant.entryType || 'regular'
                                });
                            } else {
                                const existingParticipant = participantMap.get(uniqueKey);
                                if (!existingParticipant.participantIds.includes(participant.id)) {
                                    existingParticipant.participantIds.push(participant.id);
                                }
                                
                                // Update participant info if better data available
                                if (existingParticipant.dogName === 'Unknown' && participant.dogCallName) {
                                    existingParticipant.dogName = participant.dogCallName;
                                }
                                if (existingParticipant.handlerName === 'Unknown Handler' && participant.handlerName) {
                                    existingParticipant.handlerName = participant.handlerName;
                                }
                                if (existingParticipant.cwagsNumber === 'TBD' && participant.cwagsNumber) {
                                    existingParticipant.cwagsNumber = participant.cwagsNumber;
                                }
                            }
                        });
                    }
                }
            });

            // Final data enhancement from entries
            participantMap.forEach(function(participant, uniqueKey) {
                const entry = entriesData[uniqueKey];
                if (entry) {
                    if (participant.dogName === 'Unknown' && entry.dogCallName) {
                        participant.dogName = entry.dogCallName;
                    }
                    if (participant.handlerName === 'Unknown Handler' && entry.handlerName) {
                        participant.handlerName = entry.handlerName;
                    }
                    if (participant.cwagsNumber === 'TBD' && entry.cwagsNumber) {
                        participant.cwagsNumber = entry.cwagsNumber;
                    }
                }
            });

            debugInfo.totalParticipants = participantMap.size;
            
            console.log('📈 ENHANCED: ' + className + ' final stats:', debugInfo);

            return {
                trialName: currentTrial.clubName || 'Trial',
                className: className,
                rounds: rounds,
                participants: Array.from(participantMap.values()),
                totalParticipants: participantMap.size,
                totalRounds: rounds.length,
                debugInfo: debugInfo
            };
        }

        async function generateSummary() {

            if (!trialId || !selectedClass) {
                showStatus('Please select both trial and class', 'error');

                    console.log('🔄 Generating enhanced summaries for all classes...');
                    showStatus('Generating summaries for all classes...', 'info');
                    
                    allClassSummaries = {};
                    
                    let debugSummary = {
                        totalClasses: allClassNames.length,
                        processedClasses: 0,
                        totalFeoFiltered: 0,
                        totalOrphanedFiltered: 0,
                        totalRegularIncluded: 0
                    };

                    for (let i = 0; i < allClassNames.length; i++) {
                        const className = allClassNames[i];
                        console.log('⏳ Processing class ' + (i + 1) + '/' + allClassNames.length + ': ' + className);
                        showProgress(true, Math.round((i / allClassNames.length) * 100), 'Processing ' + className);

                            }
                        }
                    }

                    showProgress(false);

                    if (Object.keys(allClassSummaries).length === 0) {
                        showStatus('No data found for any classes', 'error');

                    document.getElementById('summaryInfo').textContent = summaryData.trialName + ' • ' + Object.keys(allClassSummaries).length + ' Classes';

                    renderAllClassesSummary();

                    if (debugSummary.totalFeoFiltered > 0) statusMessage += ' (' + debugSummary.totalFeoFiltered + ' FEO entries filtered)';
                    if (debugSummary.totalOrphanedFiltered > 0) statusMessage += ' (' + debugSummary.totalOrphanedFiltered + ' orphaned scores filtered)';
                    
                    showStatus(statusMessage, 'success');
                } else {
                    showStatus('Generating enhanced class summary...', 'info');
                    currentClass = selectedClass;
                    summaryData = await generateSummaryForClass(selectedClass);

                    if (!summaryData) {
                        showStatus('No rounds found for this class. Please ensure running orders are generated first.', 'error');
                        document.getElementById('noDataMessage').style.display = 'block';
                        document.getElementById('summaryContainer').style.display = 'none';
                        return;

                    if (summaryData.debugInfo) {
                        console.log('📊 Enhanced Filtering Results for ' + selectedClass + ':', summaryData.debugInfo);
                        showDebug('Enhanced Filtering Debug Info for ' + selectedClass + ':<br>' +
                            'Regular entries included: ' + summaryData.debugInfo.regularIncluded + '<br>' +
                            'FEO entries filtered out: ' + summaryData.debugInfo.feoFiltered + '<br>' +

                            'Final participant count: ' + summaryData.debugInfo.totalParticipants);

                    renderSummary();

                    if (summaryData.debugInfo.feoFiltered > 0) statusMessage += ' (' + summaryData.debugInfo.feoFiltered + ' FEO entries filtered)';
                    if (summaryData.debugInfo.orphanedFiltered > 0) statusMessage += ' (' + summaryData.debugInfo.orphanedFiltered + ' orphaned scores filtered)';
                    
                    showStatus(statusMessage, 'success');
                }

            } catch (error) {
                console.error('Error generating enhanced summary:', error);
                showStatus('Error generating summary: ' + error.message, 'error');
                showProgress(false);
            }
        }

        // ===== ENHANCED RENDERING FUNCTIONS =====
        function renderSummary() {
            if (!summaryData) return;

            document.getElementById('summaryTitle').textContent = 'Class Summary: ' + summaryData.className;
            document.getElementById('summaryInfo').textContent = summaryData.trialName + ' • ' + summaryData.className + ' • ' + summaryData.totalParticipants + ' Participants';

            const thead = document.getElementById('summaryTableHead');
            thead.innerHTML = '';

            const judgeRow = document.createElement('tr');
            const dateRow = document.createElement('tr');
            const roundRow = document.createElement('tr');

            judgeRow.appendChild(createHeaderCell('C-WAGS Number', 'participant-cwags', 3));
            judgeRow.appendChild(createHeaderCell('Dog Name', 'participant-dog', 3));
            judgeRow.appendChild(createHeaderCell('Handler Name', 'participant-handler', 3));

            summaryData.rounds.forEach(function(round, index) {
                const parts = round.roundKey ? round.roundKey.split('-').map(Number) : [0];
                const dayIndex = parts[0];
                const dayDate = currentTrial.days && currentTrial.days[dayIndex] 
                    ? getDateFromFirebase(currentTrial.days[dayIndex].date) 
                    : 'Date TBD';
                const formattedDate = dayDate ? new Date(dayDate + 'T12:00:00').toLocaleDateString() : 'Date TBD';

                const sameJudgeDate = summaryData.rounds.filter(function(r, i) {
                    return i <= index && 
                           r.judgeName === round.judgeName && 
                           getDateFromRound(r) === getDateFromRound(round);
                }).length;

                const roundSuffix = sameJudgeDate > 1 ? ' (' + sameJudgeDate + ')' : '';

                judgeRow.appendChild(createHeaderCell(round.judgeName || 'Judge TBD', 'judge-name', 1));
                dateRow.appendChild(createHeaderCell(formattedDate, 'round-date', 1));
                roundRow.appendChild(createHeaderCell((round.className || 'Class') + roundSuffix, 'round-info', 1));
            });

            thead.appendChild(judgeRow);
            thead.appendChild(dateRow);
            thead.appendChild(roundRow);

            const tbody = document.getElementById('summaryTableBody');
            tbody.innerHTML = '';

            summaryData.participants.forEach(function(participant) {
                const row = document.createElement('tr');
                let participatedInAnyRound = false;

                row.appendChild(createDataCell(participant.cwagsNumber || 'TBD', 'participant-cwags'));
                row.appendChild(createDataCell(participant.dogName || 'Unknown', 'participant-dog'));
                row.appendChild(createDataCell(participant.handlerName || 'Unknown Handler', 'participant-handler'));

                summaryData.rounds.forEach(function(round) {
                    const cell = document.createElement('td');
                    cell.className = 'result-cell';
                    
                    let result = '-';
                    let cssClass = 'result-absent';
                    let participatedInRound = false;

                    if (round.hasScores) {
                        for (let i = 0; i < participant.participantIds.length; i++) {
                            const participantId = participant.participantIds[i];
                            if (round.participants[participantId]) {
                                const participantResult = round.participants[participantId];
                                
                                // Skip if this is FEO (double-check filtering)
                                if (isFeoEntry(participantResult.entryType)) {
                                    continue;
                                }
                                
                                participatedInRound = true;
                                
                                // USE ENHANCED RESULT PROCESSOR
                                const processedResult = processParticipantResult(participantResult);
                                result = processedResult.result;
                                cssClass = processedResult.cssClass;
                                
                                break;
                            }
                        }
                    } else {
                        if (round.participants && Array.isArray(round.participants)) {
                            for (let i = 0; i < participant.participantIds.length; i++) {
                                const participantId = participant.participantIds[i];
                                const roundParticipant = round.participants.find(function(p) {
                                    return p.id === participantId;
                                });
                                if (roundParticipant) {
                                    participatedInRound = true;
                                    result = '•';
                                    cssClass = 'result-scheduled';
                                    cell.title = 'Scheduled to run - not yet scored';
                                    break;
                                }
                            }
                        }
                    }

                    if (participatedInRound) {
                        participatedInAnyRound = true;
                    }

                    cell.textContent = result;
                    cell.className += ' ' + cssClass;
                    row.appendChild(cell);
                });

                if (participatedInAnyRound) {
                    tbody.appendChild(row);
                }
            });

            generateStatistics();
            document.getElementById('summaryContainer').style.display = 'block';
            document.getElementById('noDataMessage').style.display = 'none';
        }

        function renderAllClassesSummary() {
            const thead = document.getElementById('summaryTableHead');
            const tbody = document.getElementById('summaryTableBody');
            
            thead.innerHTML = '';
            tbody.innerHTML = '';

            const headerRow = document.createElement('tr');
            headerRow.innerHTML = '<th>Class Name</th><th>Participants</th><th>Rounds</th><th>Completion Rate</th><th>Pass Rate</th>';
            thead.appendChild(headerRow);

            Object.entries(allClassSummaries).forEach(function(entry) {
                const className = entry[0];
                const classData = entry[1];
                const row = document.createElement('tr');
                
                let totalRuns = 0;
                let totalPasses = 0;
                let totalScheduled = 0;

                classData.rounds.forEach(function(round) {
                    if (round.hasScores) {
                        Object.entries(round.participants).forEach(function(participantEntry) {
                            const participantId = participantEntry[0];
                            const result = participantEntry[1];
                            const docId = participantId.split('_')[0];
                            const participantStillExists = classData.participants.some(function(p) {
                                return p.id === docId;
                            });
                            if (!participantStillExists) return;

                            const processedResult = processParticipantResult(result);
                            if (processedResult.result && processedResult.result !== '-') {
                                totalRuns++;
                                if (processedResult.result !== 'F') {
                                    totalPasses++;
                                }
                            }
                        });
                    } else {
                        if (round.participants && Array.isArray(round.participants)) {
                            const validParticipants = round.participants.filter(function(p) {
                                const docId = p.id.split('_')[0];
                                return classData.participants.some(function(cp) {
                                    return cp.id === docId;
                                });
                            });
                            totalScheduled += validParticipants.length;
                        }
                    }
                });

                const totalPossibleRuns = totalRuns + totalScheduled;
                const completionRate = totalPossibleRuns > 0 ? ((totalRuns / totalPossibleRuns) * 100).toFixed(1) : '0';
                const passRate = totalRuns > 0 ? ((totalPasses / totalRuns) * 100).toFixed(1) : '0';

                row.innerHTML = '<td>' + className + '</td>' +
                               '<td>' + classData.totalParticipants + '</td>' +
                               '<td>' + classData.totalRounds + '</td>' +
                               '<td>' + completionRate + '% (' + totalRuns + '/' + totalPossibleRuns + ')</td>' +
                               '<td>' + passRate + '% (' + totalPasses + '/' + totalRuns + ')</td>';
                tbody.appendChild(row);
            });

            generateAllClassesStatistics();
            document.getElementById('summaryContainer').style.display = 'block';
            document.getElementById('noDataMessage').style.display = 'none';
        }

        function generateStatistics() {
            if (!summaryData) return;

            const statsSection = document.getElementById('statsSection');
            statsSection.innerHTML = '';

            let totalRuns = 0;
            let totalPasses = 0;
            let totalFails = 0;
            let totalScheduled = 0;

            summaryData.rounds.forEach(function(round) {
                if (round.hasScores) {
                    Object.entries(round.participants).forEach(function(participantEntry) {
                        const participantId = participantEntry[0];
                        const result = participantEntry[1];
                        const docId = participantId.split('_')[0];
                        const participantStillExists = summaryData.participants.some(function(p) {
                            return p.id === docId;
                        });
                        if (!participantStillExists) return;

                        // USE ENHANCED RESULT PROCESSOR
                        const processedResult = processParticipantResult(result);
                        if (processedResult.result && processedResult.result !== '-') {
                            totalRuns++;
                            // Count anything other than 'F' as a pass (GB, P, etc.)
                            if (processedResult.result !== 'F') {
                                totalPasses++;
                            } else {
                                totalFails++;
                            }
                        }
                    });
                } else {
                    if (round.participants && Array.isArray(round.participants)) {
                        const validParticipants = round.participants.filter(function(p) {
                            const docId = p.id.split('_')[0];
                            return summaryData.participants.some(function(sp) {
                                return sp.id === docId;
                            });
                        });
                        totalScheduled += validParticipants.length;
                    }
                }
            });

            const passRate = totalRuns > 0 ? ((totalPasses / totalRuns) * 100).toFixed(1) : '0';

            const stats = [
                { label: 'Total Participants', value: summaryData.totalParticipants },
                { label: 'Total Rounds', value: summaryData.totalRounds },
                { label: 'Completed Runs', value: totalRuns },
                { label: 'Scheduled Runs', value: totalScheduled },
                { label: 'Passes', value: totalPasses },
                { label: 'Fails', value: totalFails },
                { label: 'Pass Rate', value: passRate + '%' }
            ];

            stats.forEach(function(stat) {
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = '<div class="stat-value">' + stat.value + '</div>' +
                                '<div class="stat-label">' + stat.label + '</div>';
                statsSection.appendChild(card);
            });
        }

        function generateAllClassesStatistics() {
            const statsSection = document.getElementById('statsSection');
            statsSection.innerHTML = '';

            let totalClasses = Object.keys(allClassSummaries).length;
            let totalParticipants = 0;
            let totalRounds = 0;
            let totalRuns = 0;
            let totalPasses = 0;

            Object.values(allClassSummaries).forEach(function(classData) {
                totalParticipants += classData.totalParticipants;
                totalRounds += classData.totalRounds;

                classData.rounds.forEach(function(round) {
                    if (round.hasScores) {
                        Object.entries(round.participants).forEach(function(participantEntry) {
                            const participantId = participantEntry[0];
                            const result = participantEntry[1];
                            const docId = participantId.split('_')[0];
                            const participantStillExists = classData.participants.some(function(p) {
                                return p.id === docId;
                            });
                            if (!participantStillExists) return;

                            const processedResult = processParticipantResult(result);
                            if (processedResult.result && processedResult.result !== '-') {
                                totalRuns++;
                                if (processedResult.result !== 'F') {
                                    totalPasses++;
                                }
                            }
                        });
                    }
                });
            });

            const overallPassRate = totalRuns > 0 ? ((totalPasses / totalRuns) * 100).toFixed(1) : '0';

            const stats = [
                { label: 'Total Classes', value: totalClasses },
                { label: 'Total Participants', value: totalParticipants },
                { label: 'Total Rounds', value: totalRounds },
                { label: 'Completed Runs', value: totalRuns },
                { label: 'Total Passes', value: totalPasses },
                { label: 'Overall Pass Rate', value: overallPassRate + '%' }
            ];

            stats.forEach(function(stat) {
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = '<div class="stat-value">' + stat.value + '</div>' +
                                '<div class="stat-label">' + stat.label + '</div>';
                statsSection.appendChild(card);
            });
        }

        // ===== EXPORT FUNCTIONS =====
        async function exportSummaryCSV() {
            if (currentClass === 'ALL_CLASSES' && Object.keys(allClassSummaries).length > 0) {
                try {
                    showStatus('Creating CSV files for all classes...', 'info');
                    
                    const zip = new JSZip();
                    Object.entries(allClassSummaries).forEach(function(entry) {
                        const className = entry[0];
                        const classData = entry[1];
                        const csvContent = generateCSVContent(classData);
                        const filename = className.replace(/[^a-zA-Z0-9]/g, '_') + '_Summary.csv';
                        zip.file(filename, csvContent);
                    });

                    const zipContent = await zip.generateAsync({type: 'blob'});
                    const url = URL.createObjectURL(zipContent);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = (currentTrial.clubName || 'Trial') + '_All_Classes_Summary.zip';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);

                    showStatus('All class CSV files exported as ZIP!', 'success');
                } catch (error) {
                    console.error('Error exporting CSV ZIP:', error);
                    showStatus('Error exporting CSV files: ' + error.message, 'error');
                }
            } else if (summaryData) {
                try {
                    const csvContent = generateCSVContent(summaryData);
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = summaryData.className.replace(/[^a-zA-Z0-9]/g, '_') + '_Summary.csv';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);

                    showStatus('Summary CSV exported successfully!', 'success');
                } catch (error) {
                    console.error('Error exporting CSV:', error);
                    showStatus('Error exporting CSV: ' + error.message, 'error');
                }
            } else {
                showStatus('No summary data to export', 'error');
            }
        }

        function generateCSVContent(classData) {
            let csvContent = '';
            csvContent += '"Class Summary Report"\n';
            csvContent += '"Trial","' + classData.trialName + '"\n';
            csvContent += '"Class","' + classData.className + '"\n';
            csvContent += '"Generated","' + new Date().toLocaleDateString() + '"\n';
            csvContent += '\n';

            let headerRow = '"C-WAGS Number","Dog Name","Handler Name"';
            classData.rounds.forEach(function(round, index) {
                const parts = round.roundKey ? round.roundKey.split('-').map(Number) : [0];
                const dayIndex = parts[0];
                const dayDate = currentTrial.days && currentTrial.days[dayIndex] 
                    ? getDateFromFirebase(currentTrial.days[dayIndex].date) 
                    : 'Date TBD';
                const formattedDate = dayDate ? new Date(dayDate + 'T12:00:00').toLocaleDateString() : 'Date TBD';

                const sameJudgeDate = classData.rounds.filter(function(r, i) {
                    return i <= index && 
                           r.judgeName === round.judgeName && 
                           getDateFromRound(r) === getDateFromRound(round);
                }).length;

                const roundSuffix = sameJudgeDate > 1 ? ' (' + sameJudgeDate + ')' : '';
                headerRow += ',"' + (round.judgeName || 'Judge TBD') + ' - ' + formattedDate + roundSuffix + '"';
            });
            csvContent += headerRow + '\n';

            classData.participants.forEach(function(participant) {
                let row = '"' + (participant.cwagsNumber || 'TBD') + '","' + 
                         (participant.dogName || 'Unknown') + '","' + 
                         (participant.handlerName || 'Unknown Handler') + '"';

                classData.rounds.forEach(function(round) {
                    let result = '-';
                    if (round.hasScores) {
                        for (let i = 0; i < participant.participantIds.length; i++) {
                            const participantId = participant.participantIds[i];
                            if (round.participants[participantId]) {
                                const participantResult = round.participants[participantId];
                                const processedResult = processParticipantResult(participantResult);
                                result = processedResult.result;
                                break;
                            }
                        }
                    } else {
                        if (round.participants && Array.isArray(round.participants)) {
                            for (let i = 0; i < participant.participantIds.length; i++) {
                                const participantId = participant.participantIds[i];
                                const roundParticipant = round.participants.find(function(p) {
                                    return p.id === participantId;
                                });
                                if (roundParticipant) {
                                    result = '•';
                                    break;
                                }
                            }
                        }
                    }
                    row += ',"' + result + '"';
                });
                csvContent += row + '\n';
            });

            return csvContent;
        }

        async function exportSummaryExcel() {
            if (currentClass === 'ALL_CLASSES' && Object.keys(allClassSummaries).length > 0) {
                try {
                    showStatus('Creating Excel workbook with all classes...', 'info');
                    
                    const workbook = XLSX.utils.book_new();
                    Object.entries(allClassSummaries).forEach(function(entry) {
                        const className = entry[0];
                        const classData = entry[1];
                        const worksheetData = generateExcelSheetData(classData);
                        const worksheet = XLSX.utils.aoa_to_sheet(worksheetData);
                        const sheetName = className.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 31);
                        XLSX.utils.book_append_sheet(workbook, worksheet, sheetName);
                    });

                    const excelBuffer = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });

                    });

                    const link = document.createElement('a');

                    link.download = (currentTrial.clubName || 'Trial') + '_All_Classes_Summary.xlsx';
                    document.body.appendChild(link);
